(function(){
  // Draw the app icon on a canvas
  function rRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function makeIcon(size){
    const c=document.createElement("canvas");
    c.width=size;c.height=size;
    const ctx=c.getContext("2d");
    ctx.fillStyle="#0B1219";
    rRect(ctx,0,0,size,size,size*0.22);
    ctx.fill();
    ctx.strokeStyle="#D4A254";
    ctx.lineWidth=size*0.04;
    rRect(ctx,size*0.06,size*0.06,size*0.88,size*0.88,size*0.18);
    ctx.stroke();
    ctx.font=`${size*0.52}px serif`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText("📚",size/2,size/2+size*0.04);
    return c.toDataURL("image/png");
  }

  const icon192=makeIcon(192);
  const icon512=makeIcon(512);

  // Apple touch icon (iOS home screen)
  const appleIcon=document.createElement("link");
  appleIcon.rel="apple-touch-icon";

    "https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js",
    "https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js",

  const dot = ok => React.createElement("span", {
    style: {
      display: "inline-block", width: 7, height: 7, borderRadius: "50%",
      background: ok === null ? "#666" : ok ? "#4ADE80" : "#F87171",
      boxShadow: ok === null ? "none" : ok ? "0 0 5px #4ADE80" : "0 0 5px #F87171",
      flexShrink: 0
    }
  });
  const label = (ok, name) => React.createElement("span", {
    style: {
      display: "flex", alignItems: "center", gap: 5,
      color: ok === null ? "#666" : ok ? "#4ADE80" : "#F87171",
      fontWeight: ok === false ? 700 : 400
    }
  }, dot(ok), name, ok === false ? " ✗" : ok === true ? " ✓" : "…");
  return React.createElement("div", {
    style: {
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 200,
      background: "#0C0C0C", borderBottom: "1px solid #252525",
      padding: "5px 14px", display: "flex", alignItems: "center",
      gap: 14, fontFamily: "sans-serif", fontSize: 11, letterSpacing: 0.3
    }
  },
    !done && React.createElement(Spin, null),
    React.createElement("span", { style: { color: "#555", textTransform: "uppercase", fontSize: 10, letterSpacing: 1 } }, "Services"),
    label(status.el, "ElevenLabs"),
    label(status.ai, "AI"),
    done && React.createElement("button", {
      onClick: onClose,
      style: { marginLeft: "auto", background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 16, lineHeight: 1, padding: "0 2px" }
    }, "×")
  );
}

    if (audioElR.current) {
      audioElR.current.pause();

    }

    sPause(false);
    sWIdx(-1);

  // ── Browser TTS playback ──────────────────────────────────────────────────
  const playFromBrowser = useCallback(idx => {
    const wp = wpR.current;

    const ci = Math.max(0, Math.min(idx, wp.length - 1));
    const off = wp[ci]?.s ?? 0;
    offR.current = off;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(t.slice(off));
    const vs = vsR.current;
    const vi = viR.current;
    if (vs[vi]) utt.voice = vs[vi];
    utt.rate = rR.current;
    utt.pitch = pR.current;
    utt.volume = vR.current;
    let fired = false;
    utt.onboundary = e => {
      if (e.name !== "word") return;
      fired = true;
      sBOk(true);
      const abs = offR.current + e.charIndex;
      const wi = bsearchWord(wpR.current, abs);
      if (wi >= 0) {
        sWIdx(wi);
        wR.current = wi;
        if (acR.current?.id && wi % 8 === 0) saveProg(acR.current.id, wi);
      }
    };

      if (!fired) sBOk(false);

    utt.onend = () => {
      sPlay(false);
      sPause(false);
      sWIdx(-1);

    const startChar = wp[Math.max(0, Math.min(idx, wp.length - 1))]?.s ?? 0;
    const textToRead = t.slice(startChar);
    const chunks = splitChunks(textToRead);

    // Map chunks back to absolute word indices
    let wordOffset = idx;
    const chunkMeta = chunks.map(ch => {
      const wordOffsets = wordOffsetsIn(ch);
      const meta = { text: ch, wordStart: wordOffset, wordCount: wordOffsets.length, wordOffsets };
      wordOffset += wordOffsets.length;
      return meta;
    });
    sPlay(true);
    sPause(false);
    plR.current = true;
    paR.current = false;
    sWIdx(idx);
    wR.current = idx;
    for (const chunk of chunkMeta) {
      if (stopFlagR.current || !plR.current) break;
      sGenBusy(true);
      try {
        const res = await fetch("https://api.openai.com/v1/audio/speech", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${oaiKeyR.current}`,

          body: JSON.stringify({
            model: "tts-1-hd",
            input: chunk.text,
            voice: oaiVoiceR.current
          })

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `OpenAI error ${res.status}`);
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.playbackRate = rR.current;
        audioElR.current = audio;
        sGenBusy(false);
        if (stopFlagR.current) {
          URL.revokeObjectURL(url);
          break;
        }
        await new Promise((resolve, reject) => {
          audio.addEventListener("loadedmetadata", () => {
            const cps = chunk.text.length / audio.duration; // chars per second
            const tick = () => {
              if (!plR.current || audio.paused || audio.ended) return;
              const charPos = audio.currentTime * audio.playbackRate * cps;
              const wordInChunk = bsearchNum(chunk.wordOffsets, charPos);
              const wi = Math.min(chunk.wordStart + wordInChunk, chunk.wordStart + chunk.wordCount - 1);
              if (wi !== wR.current) {
                sWIdx(wi);
                wR.current = wi;
                if (acR.current?.id && wi % 8 === 0) saveProg(acR.current.id, wi);
              }
              rafR.current = requestAnimationFrame(tick);
            };
            rafR.current = requestAnimationFrame(tick);
            audio.play().catch(reject);
          });
          audio.addEventListener("ended", () => {
            if (rafR.current) { cancelAnimationFrame(rafR.current); rafR.current = null; }
            URL.revokeObjectURL(url);
            resolve();
          });
          audio.addEventListener("error", e => {
            if (rafR.current) { cancelAnimationFrame(rafR.current); rafR.current = null; }

    for (const chunk of chunkMeta) {
      if (stopFlagR.current || !plR.current) break;
      sGenBusy(true);
      try {
        const res = await fetch(`/api/elevenlabs?ep=tts&vid=${elVoiceIdR.current}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "audio/mpeg"
          },
          body: JSON.stringify({
            text: chunk.text,
            model_id: "eleven_turbo_v2_5",
            voice_settings: {
              stability: 0.5,
              similarity_boost: 0.75
            }
          })
        });
        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.detail?.message || j.detail || `ElevenLabs error ${res.status}`);
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.playbackRate = rR.current;
        audioElR.current = audio;
        sGenBusy(false);
        if (stopFlagR.current) {
          URL.revokeObjectURL(url);
          break;
        }
        await new Promise((resolve, reject) => {
          audio.addEventListener("loadedmetadata", () => {
            const cps = chunk.text.length / audio.duration;
            const tick = () => {
              if (!plR.current || audio.paused || audio.ended) return;
              const charPos = audio.currentTime * audio.playbackRate * cps;
              const wordInChunk = bsearchNum(chunk.wordOffsets, charPos);
              const wi = Math.min(chunk.wordStart + wordInChunk, chunk.wordStart + chunk.wordCount - 1);
              if (wi !== wR.current) {
                sWIdx(wi);
                wR.current = wi;
                if (acR.current?.id && wi % 8 === 0) saveProg(acR.current.id, wi);
              }
              rafR.current = requestAnimationFrame(tick);
            };
            rafR.current = requestAnimationFrame(tick);
            audio.play().catch(reject);

        sGenBusy(false);
        sCmdFb("⚠️ " + e.message);
        setTimeout(() => sCmdFb(""), 4000);
        break;
      }
    }
    if (!stopFlagR.current) {
      sPlay(false);
      sPause(false);
      sWIdx(-1);
      wR.current = -1;
      plR.current = false;
      paR.current = false;
      if (acR.current?.id) saveProg(acR.current.id, 0);

    setTimeout(() => {

  useEffect(() => { playFromR.current = playFrom; }, [playFrom]);
  const seek = useCallback(secs => {

    }
    const skip = Math.round(Math.abs(secs) * WPS * rR.current);
    const cur = wR.current >= 0 ? wR.current : 0;

        paR.current = false;

  const addBM = useCallback(() => {
