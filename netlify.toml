[build]
  # Injects the eleven_api_key Netlify environment variable into index.html at build time.
  # Set the variable in: Netlify dashboard → Site → Environment variables → eleven_api_key
  command = "node -e \"const fs=require('fs');let h=fs.readFileSync('index.html','utf8');const k=process.env.eleven_api_key||'';h=h.replace('NETLIFY_INJECTED_EL_KEY',k);fs.writeFileSync('index.html',h);console.log('ElevenLabs key injected:',k?'yes':'not set');\""
  publish = "."
